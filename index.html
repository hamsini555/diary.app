<!DOCTYPE html>
<html>
<head>
<title>Cozy Private Diary</title>
<script src="javascript-frontend.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #ffeef5, #e0f7fa);
  margin: 0;
}

#moodSection button {
  font-size: 28px;
  margin: 10px;
  padding: 12px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
}

#diary {
  display: none;
  margin-top: 20px;
}

#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: transparent;
}

.popup-box {
  background: white;
  width: 60%;
  margin: 80px auto;
  padding: 20px;
  border-radius: 15px;
  max-height: 70%;
  overflow: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(80px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>

</head>

<body>

<div id="moodSection">
  <h1>🌷 How are you feeling today?</h1>

  <button onclick="selectMood('😊 Happy')">😊</button>
  <button onclick="selectMood('😌 Calm')">😌</button>
  <button onclick="selectMood('😔 Sad')">😔</button>
  <button onclick="selectMood('😡 Angry')">😡</button>
  <button onclick="selectMood('🥰 Loved')">🥰</button>
  <button onclick="selectMood('😴 Tired')">😴</button>
</div>

<!-- DIARY -->
<div id="diary">
  <h2>✨ My Private Diary</h2>
  <p id="moodText"></p>

  <input id="title" placeholder="Title"><br><br>
  <textarea id="content" placeholder="Write..." rows="5" cols="30"></textarea>
  <br><br>

  <p id="datetime"></p>

  <button onclick="saveEntry()">Save ✨</button>
  <button onclick="askPassword()">🔒 View Entries</button>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2>📖 My Entries</h2>
    <button onclick="closeDiary()">Close ❌</button>
    <div id="entries"></div>
  </div>
</div>

</body>
</html>
