<!DOCTYPE html>
<html>
<head>
<title>Cozy Private Diary</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #ffeef5, #e0f7fa);
  margin: 0;
}

/* MOOD BUTTONS */
#moodSection button {
  font-size: 28px;
  margin: 10px;
  padding: 12px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
}

/* DIARY */
#diary {
  display: none;
  margin-top: 20px;
}

/* POPUP (NO DARK BACKGROUND) */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: transparent; /* IMPORTANT FIX */
}

/* POPUP BOX */
.popup-box {
  background: white;
  width: 60%;
  margin: 80px auto;
  padding: 20px;
  border-radius: 15px;
  max-height: 70%;
  overflow: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);

  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(80px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>

</head>

<body>

<!-- MOOD -->
<div id="moodSection">
  <h1>🌷 How are you feeling today?</h1>

  <button onclick="selectMood('😊 Happy')">😊</button>
  <button onclick="selectMood('😌 Calm')">😌</button>
  <button onclick="selectMood('😔 Sad')">😔</button>
  <button onclick="selectMood('😡 Angry')">😡</button>
  <button onclick="selectMood('🥰 Loved')">🥰</button>
  <button onclick="selectMood('😴 Tired')">😴</button>
</div>

<!-- DIARY -->
<div id="diary">

  <h2>✨ My Private Diary</h2>
  <p id="moodText"></p>

  <input id="title" placeholder="Title"><br><br>
  <textarea id="content" placeholder="Write..." rows="5" cols="30"></textarea>
  <br><br>

  <p id="datetime"></p>

  <button onclick="saveEntry()">Save ✨</button>
  <button onclick="askPassword()">🔒 View Entries</button>

</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2>📖 My Entries</h2>
    <button onclick="closeDiary()">Close ❌</button>
    <div id="entries"></div>
  </div>
</div>

<script>
let mood = "";

// MOOD SELECT
function selectMood(m) {
  mood = m;

  document.getElementById("moodSection").style.display = "none";
  document.getElementById("diary").style.display = "block";

  document.getElementById("moodText").innerText = "Mood: " + mood;

  updateTime();
}

// DATE TIME
function getDateTime() {
  return new Date().toLocaleString();
}

function updateTime() {
  document.getElementById("datetime").innerText = getDateTime();
  setTimeout(updateTime, 1000);
}

// SAVE ENTRY
function saveEntry() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if (!title || !content) {
    alert("Write something!");
    return;
  }

  const entry = { title, content, mood, datetime: getDateTime() };

  let data = JSON.parse(localStorage.getItem("diary")) || [];
  data.push(entry);

  localStorage.setItem("diary", JSON.stringify(data));

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";

  alert("Saved!");
}

// PASSWORD
function askPassword() {
  const pass = prompt("Enter password (1234)");

  if (pass === "1234") {
    openDiary();
  } else {
    alert("Wrong password!");
  }
}

// OPEN POPUP
function openDiary() {
  document.getElementById("popup").style.display = "block";
  displayEntries();
}

// CLOSE POPUP
function closeDiary() {
  document.getElementById("popup").style.display = "none";
}

// SHOW ENTRIES
function displayEntries() {
  const container = document.getElementById("entries");
  container.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("diary")) || [];

  data.reverse().forEach(e => {
    const div = document.createElement("div");

    div.innerHTML = `
      <hr>
      <h3>${e.title}</h3>
      <p>${e.content}</p>
      <p>${e.mood}</p>
      <small>${e.datetime}</small>
    `;

    container.appendChild(div);
  });
}
</script>

</body>
</html>
